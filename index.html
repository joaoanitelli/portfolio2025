    <script>
        const LANG_KEY = 'portfolio-lang';

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'pt',
                includedLanguages: 'pt,en,es',
                autoDisplay: false
            }, 'google_translate_element');
        }

        function setActiveLangBtn(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        function detectUserLang() {
            const saved = localStorage.getItem(LANG_KEY);
            if (saved) return saved;
            const browserLang = (navigator.language || 'pt').toLowerCase();
            if (browserLang.startsWith('en')) return 'en';
            if (browserLang.startsWith('es')) return 'es';
            return 'pt';
        }

        function restorePortuguese() {
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' + location.hostname;
            document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + location.hostname;
            localStorage.setItem(LANG_KEY, 'pt');
            location.reload();
        }

        function applyTranslation(lang, onDone) {
            setActiveLangBtn(lang);
            if (lang === 'pt') { if (onDone) onDone(); return; }

            // Aguarda widget + delay extra para garantir que está pronto
            let attempts = 0;
            const tryTranslate = setInterval(() => {
                const select = document.querySelector('.goog-te-combo');
                if (select && select.options.length > 1) {
                    clearInterval(tryTranslate);
                    setTimeout(() => {
                        select.value = lang;
                        select.dispatchEvent(new Event('change'));
                        if (onDone) setTimeout(onDone, 1200);
                    }, 300);
                }
                if (++attempts > 50) { clearInterval(tryTranslate); if (onDone) onDone(); }
            }, 100);
        }

        function retranslatePage(onDone) {
            const lang = localStorage.getItem(LANG_KEY) || 'pt';
            applyTranslation(lang, onDone);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const initialLang = detectUserLang();

            if (initialLang === 'pt') {
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.' + location.hostname;
            }

            setActiveLangBtn(initialLang);

            // Delay inicial para garantir que o widget do Google carregou
            setTimeout(() => applyTranslation(initialLang), 800);

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const lang = btn.dataset.lang;
                    setActiveLangBtn(lang);
                    const sp = document.getElementById('pageSpinner');
                    sp.classList.add('active');
                    if (lang === 'pt') {
                        restorePortuguese();
                    } else {
                        localStorage.setItem(LANG_KEY, lang);
                        applyTranslation(lang, () => sp.classList.remove('active'));
                    }
                });
            });
        });
    </script>



    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
